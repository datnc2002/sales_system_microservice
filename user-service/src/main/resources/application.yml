server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${SPRING_DATASOURCE_USERNAME:htpt_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:htpt_secret_2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBodHB0IG1pY3Jvc2VydmljZSBwcm9qZWN0}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.htpt.user: INFO
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /api/users/v3/api-docs
  swagger-ui:
    path: /api/users/swagger-ui.html
