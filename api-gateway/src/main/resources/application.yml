server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # Auth routes (no JWT required)
        - id: auth-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        # User routes
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthFilter

        # Product routes (GET public, others need auth)
        - id: product-service-public
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/products/**,/api/categories/**
            - Method=GET

        - id: product-service-admin
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/products/**,/api/categories/**
            - Method=POST,PUT,DELETE
          filters:
            - JwtAuthFilter

        # Order routes
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
          filters:
            - JwtAuthFilter

        # Inventory routes
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/inventory/**
          filters:
            - JwtAuthFilter

        # Notification routes
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuthFilter

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBodHB0IG1pY3Jvc2VydmljZSBwcm9qZWN0}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.htpt.gateway: DEBUG
