server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${SPRING_DATASOURCE_USERNAME:htpt_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:htpt_secret_2026}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

product-service:
  url: ${PRODUCT_SERVICE_URL:http://htpt-product-service:8082}

user-service:
  url: ${USER_SERVICE_URL:http://htpt-user-service:8081}

logging:
  level:
    com.htpt.order: INFO

springdoc:
  api-docs:
    path: /api/orders/v3/api-docs
