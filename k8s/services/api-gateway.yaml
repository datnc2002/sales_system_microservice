apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: htpt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          # CHÚ Ý: Đổi tên registry docker hub của bạn ở đây
          image: congdat0703/htpt-api-gateway:v1
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: htpt-secrets
                  key: JWT_SECRET
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8082"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8083"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:8084"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8085"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: htpt
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
