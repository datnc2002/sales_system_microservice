# ================= USER SERVICE =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: htpt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          # CHÚ Ý: Đổi tên registry docker hub của bạn ở đây
          image: congdat0703/htpt-user-service:v1
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/user_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: htpt-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: htpt-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: htpt-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRATION_MS
              valueFrom:
                secretKeyRef:
                  name: htpt-secrets
                  key: JWT_EXPIRATION_MS
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: htpt
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081

