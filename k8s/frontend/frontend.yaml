apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: htpt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # CHÚ Ý: Đổi tên registry docker hub của bạn ở đây
          image: congdat0703/htpt-frontend:v2
          ports:
            - containerPort: 3000
          env:
            # Sẽ cần lấy External IP của node để điền vào đây, hoặc dùng NodePort IP.
            # Vì bạn có 3 nodes, bạn có thể dùng IP của bất kỳ node nào.
            - name: VITE_API_URL
              value: "http://34.21.179.15:30080/api"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: htpt
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
