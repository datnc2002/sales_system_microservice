apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: htpt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: congdat0703/htpt-frontend:v2
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              valueFrom:
                secretKeyRef:
                  name: htpt-secrets
                  key: VITE_API_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: htpt
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
